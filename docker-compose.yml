services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mfa
      POSTGRES_PASSWORD: mfa
      POSTGRES_DB: mfa
    ports:
      - "5432:5432"
    volumes:
      - mfa_pg_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mfa -d mfa"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_PORT: 4000
      DATABASE_URL: postgres://mfa:mfa@db:5432/mfa
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      ATTOM_API_KEY: ${ATTOM_API_KEY:-}
      RENTCAST_API_KEY: ${RENTCAST_API_KEY:-}
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro

  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
      - ./apps/web/index.html:/app/apps/web/index.html:ro

volumes:
  mfa_pg_data:
