# DigitalOcean App Platform spec for multifamily-analyzer.
# Create: doctl apps create --spec .do/app.yaml
# Update: doctl apps update <app-id> --spec .do/app.yaml

name: multifamily-analyzer
region: nyc

databases:
  - name: mfa-db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
    production: false

services:
  - name: api
    dockerfile_path: infra/Dockerfile.api.prod
    source_dir: /
    github:
      repo: tberch-ts/realestate
      branch: main
      deploy_on_push: true
    http_port: 4000
    internal_ports:
      - 4000
    instance_size_slug: basic-xs
    instance_count: 1
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 10
      failure_threshold: 3
    # Persistent cache volume (~1 GiB, ~$1/mo). If App Platform rejects this field
    # for the chosen instance size, drop the whole `disk` block — the app still runs,
    # but the Denver hotspot/portfolio warm cache is lost on each deploy.
    disk:
      name: api-cache
      mount_path: /app/apps/api/.cache
      size_gib: 1
    envs:
      - { key: NODE_ENV, value: production, scope: RUN_TIME }
      - { key: API_PORT, value: "4000", scope: RUN_TIME }
      - { key: DATABASE_URL, value: "${mfa-db.DATABASE_URL}", scope: RUN_TIME }
      - { key: GOOGLE_MAPS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: CENSUS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: BLS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: FBI_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_USER, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_PASS, scope: RUN_TIME, type: SECRET }

  - name: web
    dockerfile_path: infra/Dockerfile.web.prod
    source_dir: /
    github:
      repo: tberch-ts/realestate
      branch: main
      deploy_on_push: true
    http_port: 80
    instance_size_slug: basic-xs
    instance_count: 1
    routes:
      - path: /
    envs:
      - { key: API_URL, value: "/api", scope: RUN_TIME }
      - { key: GOOGLE_MAPS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_USER, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_PASS, scope: RUN_TIME, type: SECRET }

jobs:
  - name: db-migrate
    kind: PRE_DEPLOY
    dockerfile_path: infra/Dockerfile.api.prod
    source_dir: /
    github:
      repo: tberch-ts/realestate
      branch: main
    run_command: node dist/db/migrate.js
    instance_size_slug: basic-xs
    instance_count: 1
    envs:
      - { key: NODE_ENV, value: production, scope: RUN_TIME }
      - { key: DATABASE_URL, value: "${mfa-db.DATABASE_URL}", scope: RUN_TIME }

domains:
  - domain: re.talkstud.io
    type: PRIMARY
