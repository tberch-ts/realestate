# DigitalOcean App Platform spec for multifamily-analyzer.
# Create: doctl apps create --spec .do/app.yaml
# Update: doctl apps update <app-id> --spec .do/app.yaml

name: multifamily-analyzer
region: nyc

databases:
  - name: mfa-db
    engine: PG
    version: "16"
    # Real managed PG (smallest tier). Dev tier (db-s-dev-database) gives the
    # bound app user CONNECT only — no CREATE on its own database — so DDL
    # migrations fail with permission denied. Managed tier makes the app user
    # the database owner.
    size: db-s-1vcpu-1gb
    num_nodes: 1
    production: true

services:
  - name: api
    dockerfile_path: infra/Dockerfile.api.prod
    source_dir: /
    github:
      repo: tberch-ts/realestate
      branch: main
      deploy_on_push: true
    # No http_port here — api is internal-only. internal_ports lets the web
    # service reach it via `api:4000` without DO synthesizing a public route.
    internal_ports:
      - 4000
    instance_size_slug: basic-xs
    instance_count: 1
    health_check:
      http_path: /health
      port: 4000
      initial_delay_seconds: 20
      period_seconds: 10
      failure_threshold: 3
    # NOTE: persistent disks aren't accepted at the service level on basic-xs
    # (App Platform rejects `disk:` here). The Denver warm cache lives in
    # /app/apps/api/.cache and is rebuilt at startup (~90s of cold latency
    # right after each deploy). To get persistence, upgrade to a professional
    # instance size or move the cache to Spaces.
    envs:
      - { key: NODE_ENV, value: production, scope: RUN_TIME }
      - { key: API_PORT, value: "4000", scope: RUN_TIME }
      - { key: DATABASE_URL, value: "${mfa-db.DATABASE_URL}", scope: RUN_TIME }
      - { key: GOOGLE_MAPS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: CENSUS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: BLS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: FBI_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_USER, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_PASS, scope: RUN_TIME, type: SECRET }

  - name: web
    dockerfile_path: infra/Dockerfile.web.prod
    source_dir: /
    github:
      repo: tberch-ts/realestate
      branch: main
      deploy_on_push: true
    http_port: 80
    instance_size_slug: basic-xs
    instance_count: 1
    envs:
      - { key: API_URL, value: "/api", scope: RUN_TIME }
      - { key: GOOGLE_MAPS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_USER, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_PASS, scope: RUN_TIME, type: SECRET }

jobs:
  - name: db-migrate
    kind: PRE_DEPLOY
    dockerfile_path: infra/Dockerfile.api.prod
    source_dir: /
    github:
      repo: tberch-ts/realestate
      branch: main
    run_command: node dist/db/migrate.js
    instance_size_slug: basic-xs
    instance_count: 1
    envs:
      - { key: NODE_ENV, value: production, scope: RUN_TIME }
      - { key: DATABASE_URL, value: "${mfa-db.DATABASE_URL}", scope: RUN_TIME }

domains:
  - domain: re.talkstud.io
    type: PRIMARY
