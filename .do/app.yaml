# DigitalOcean App Platform spec for multifamily-analyzer.
# Create: doctl apps create --spec .do/app.yaml
# Update: doctl apps update <app-id> --spec .do/app.yaml
#
# DATABASE_URL points at a standalone managed PG cluster (provisioned via
# `doctl databases create mfa-postgres ...`), NOT an inline App Platform
# database. App Platform inline DBs only grant the binding user CONNECT —
# DDL migrations fail with permission denied. With a standalone cluster
# we own doadmin, the migrate job can create schemas, and the cluster
# survives app deletions.

name: multifamily-analyzer
region: nyc

services:
  - name: api
    dockerfile_path: infra/Dockerfile.api.prod
    source_dir: /
    github:
      repo: tberch-ts/realestate
      branch: main
      deploy_on_push: true
    # No http_port here — api is internal-only. internal_ports lets the web
    # service reach it via `api:4000` without DO synthesizing a public route.
    internal_ports:
      - 4000
    instance_size_slug: basic-xs
    instance_count: 1
    health_check:
      http_path: /health
      port: 4000
      initial_delay_seconds: 20
      period_seconds: 10
      failure_threshold: 3
    envs:
      - { key: NODE_ENV, value: production, scope: RUN_TIME }
      - { key: API_PORT, value: "4000", scope: RUN_TIME }
      - { key: DATABASE_URL, scope: RUN_TIME, type: SECRET }
      - { key: GOOGLE_MAPS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: CENSUS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: BLS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: FBI_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_USER, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_PASS, scope: RUN_TIME, type: SECRET }

  - name: web
    dockerfile_path: infra/Dockerfile.web.prod
    source_dir: /
    github:
      repo: tberch-ts/realestate
      branch: main
      deploy_on_push: true
    http_port: 80
    instance_size_slug: basic-xs
    instance_count: 1
    envs:
      # Empty — every call site already prefixes /api, so API_URL is just the origin.
      - { key: API_URL, value: "", scope: RUN_TIME }
      - { key: GOOGLE_MAPS_API_KEY, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_USER, scope: RUN_TIME, type: SECRET }
      - { key: BASIC_AUTH_PASS, scope: RUN_TIME, type: SECRET }

jobs:
  - name: db-migrate
    kind: PRE_DEPLOY
    dockerfile_path: infra/Dockerfile.api.prod
    source_dir: /
    github:
      repo: tberch-ts/realestate
      branch: main
    run_command: node dist/db/migrate.js
    instance_size_slug: basic-xs
    instance_count: 1
    envs:
      - { key: NODE_ENV, value: production, scope: RUN_TIME }
      - { key: DATABASE_URL, scope: RUN_TIME, type: SECRET }

domains:
  - domain: re.talkstud.io
    type: PRIMARY
