server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Runtime-injected env + health check are the only unauthed paths.
  location = /env.js {
    auth_basic off;
    default_type application/javascript;
    try_files $uri =404;
  }

  location = /healthz {
    auth_basic off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Everything else — static assets and API — is gated by basic auth.
  auth_basic "MFA";
  auth_basic_user_file /etc/nginx/.htpasswd;

  # Proxy API. nginx auto-forwards the Authorization header it already validated.
  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;
    proxy_read_timeout 60s;
  }

  # SPA — fall through to index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed assets aggressively; don't cache index.html.
  location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|ico)$ {
    auth_basic "MFA";
    auth_basic_user_file /etc/nginx/.htpasswd;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
